[opener]
edit = [
    { run = 'nvim "%s"', block = true, for = "unix", desc = "Neovim" },
]
pdf = [
    { run = 'zathura "%s"', orphan = true, for = "unix", desc = "Zathura" },
]
image = [
    { run = 'imv "%s"', orphan = true, for = "unix", desc = "IMV" },
]
video = [
    { run = 'mpv "%s"', orphan = true, for = "unix", desc = "MPV" },
]

[open]
rules = [
    # Si el archivo es PDF, usa Zathura (ignorando a Firefox)
    { mime = "application/pdf", use = "pdf" },
    
    # Si es imagen, usa IMV
    { mime = "image/*", use = "image" },
    
    # Si es video, usa MPV
    { mime = "video/*", use = "video" },
    
    # Si es texto o código, usa Neovim
    { mime = "text/*", use = "edit" },
    { name = "*.py",   use = "edit" },
    { name = "*.md",   use = "edit" },
    { name = "*.sh",   use = "edit" },

    # Para todo lo demás que no sepamos, que intente abrir con el sistema
    { name = "*", use = "open" }
]
