general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    # Ruta a tu nuevo fondo
    path = /home/vic/media/wallpapers/space.png   
    
    # Efecto de desenfoque (blur)
    blur_passes = 2 
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vignette = 0.1
    vignette_thickness = 0.2
}

# RELOJ
label {
    monitor =
    text = $TIME
    color = rgb(cba6f7) # Mauve (Morado Mocha)
    font_size = 120
    font_family = JetBrainsMono NF Bold
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 3
}

# CAJA DE ENTRADA (PASSWORD)
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 3
    dots_size = 0.2 # Tamaño de los puntos de la contraseña
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(b4befe) # Lavender
    inner_color = rgb(31, 32, 44) # Surface0 Mocha
    font_color = rgb(cdd6f4) # Text Mocha
    fade_on_empty = true
    placeholder_text = <i>Ingresa contraseña...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# MENSAJE DE USUARIO
label {
    monitor =
    text = Hola, $USER
    color = rgb(bac2de) # Subtext1
    font_size = 25
    font_family = JetBrainsMono NF
    position = 0, -40
    halign = center
    valign = center
}
